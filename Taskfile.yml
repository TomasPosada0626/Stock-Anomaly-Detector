version: "3"

tasks:
  setup:local:
    desc: Run local bootstrap script
    cmds:
      - bash scripts/setup_local.sh

  hooks:install:
    desc: Install pre-commit hooks
    cmds:
      - ./.venv/Scripts/python -m pip install pre-commit
      - ./.venv/Scripts/python -m pre_commit install

  bootstrap:
    desc: Create virtualenv and install app dependencies
    cmds:
      - python -m venv .venv
      - ./.venv/Scripts/python -m pip install --upgrade pip
      - ./.venv/Scripts/python -m pip install -r requirements/lock.txt

  run:
    desc: Start Streamlit app
    cmds:
      - ./.venv/Scripts/python -m streamlit run src/app.py

  test:
    desc: Run test suite
    cmds:
      - ./.venv/Scripts/python -m pytest

  quality:
    desc: Run lint and format checks
    cmds:
      - ./.venv/Scripts/python -m ruff check src/services src/ui src/config tests
      - ./.venv/Scripts/python -m black --check src/services src/ui src/config tests src/app.py

  e2e:
    desc: Run Playwright smoke test (requires app running on E2E_BASE_URL)
    cmds:
      - ./.venv/Scripts/python -m pip install -r requirements/e2e.txt
      - ./.venv/Scripts/python -m playwright install chromium
      - ./.venv/Scripts/python -m pytest tests/e2e -q

  security:
    desc: Run security scans
    cmds:
      - ./.venv/Scripts/python -m bandit -r src/services src/ui -ll
      - ./.venv/Scripts/python -m pip_audit -r requirements/lock.txt

  coverage:
    desc: Run tests with coverage report
    cmds:
      - ./.venv/Scripts/python -m pytest --cov=src --cov-report=term-missing

  smoke:cd:
    desc: Local smoke check against deployed app URL
    cmds:
      - powershell -NoProfile -Command "$url='https://quantvision-tomas.streamlit.app/'; $response=Invoke-WebRequest -Uri $url -UseBasicParsing; if ($response.StatusCode -ne 200) { throw 'HTTP check failed' }; if ($response.Content -notmatch 'QuantVision|streamlit') { throw 'Content check failed' }; Write-Host 'Smoke check passed'"

  scheduler:run:
    desc: Run scheduled alert evaluator
    cmds:
      - ./.venv/Scripts/python scripts/run_scheduler.py

  data:download:
    desc: Download all ticker csv files
    cmds:
      - ./.venv/Scripts/python scripts/download_all_tickers.py

  demo:bootstrap:
    desc: Create demo user and optionally preload sample data
    cmds:
      - ./.venv/Scripts/python scripts/bootstrap_demo.py --with-data
