version: '3.9'

services:
  app:
    build: .
    ports:
      - "8501:8501"
    environment:
      - ENVIRONMENT=development
      - DATABASE_URL=postgresql+psycopg://quantvision:quantvision@postgres:5432/quantvision
      - USE_SQLALCHEMY_REPOSITORIES=true
      - SCHEDULER_WORKER_MODE=false
    depends_on:
      - postgres
    volumes:
      - ./data:/app/data
      - ./storage:/app/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: quantvision
      POSTGRES_PASSWORD: quantvision
      POSTGRES_DB: quantvision
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quantvision"]
      interval: 10s
      timeout: 5s
      retries: 5

  scheduler:
    build: .
    command: python scripts/run_scheduler.py
    environment:
      - ENVIRONMENT=development
      - SCHEDULER_WORKER_MODE=true
      - SCHEDULER_INTERVAL_MINUTES=5
      - DATABASE_URL=postgresql+psycopg://quantvision:quantvision@postgres:5432/quantvision
      - USE_SQLALCHEMY_REPOSITORIES=true
    depends_on:
      - postgres
    volumes:
      - ./storage:/app/storage

  api:
    build: .
    command: uvicorn src.api.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+psycopg://quantvision:quantvision@postgres:5432/quantvision
      - USE_SQLALCHEMY_REPOSITORIES=true
    depends_on:
      - postgres

volumes:
  postgres_data:
