codecov:
  require_ci_to_pass: true

coverage:
  precision: 2
  round: down
  range: "90...100"

  status:
    project:
      default:
        target: 0.95
        threshold: "0.01"
        base: auto
    patch:
      default:
        target: 0.95
        threshold: "0.01"

comment:
  layout: "reach,diff,flags,files"
  behavior: default
  require_changes: false
  require_base: false
  require_head: true
