name: CD

on:
  workflow_run:
    workflows: ["CI"]
    branches: ["main"]
    types: [completed]
  workflow_dispatch:

jobs:
  deploy-health-check:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    env:
      APP_URL: https://quantvision-tomas.streamlit.app/

    steps:
      - name: Wait for app rollout
        run: sleep 20

      - name: Check app availability
        run: |
          set -e
          for i in 1 2 3 4 5; do
            body_file=$(mktemp)
            status=$(curl -L -s -o "$body_file" -w "%{http_code}" "$APP_URL")
            if [ "$status" = "200" ]; then
              if grep -Eiq "quantvision|streamlit" "$body_file"; then
                echo "App is healthy (HTTP 200 + expected content)."
                exit 0
              fi
              echo "HTTP 200 but content check failed."
            fi
            echo "Attempt $i failed with status $status, retrying..."
            sleep 10
          done
          echo "Deployment smoke test failed."
          exit 1
