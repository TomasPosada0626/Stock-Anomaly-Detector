name: CD

on:
  workflow_run:
    workflows: ["CI"]
    branches: ["main"]
    types: [completed]
  workflow_dispatch:

jobs:
  deploy-health-check:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    env:
      APP_URL: https://stock-anomaly-detector-tomas.streamlit.app/

    steps:
      - name: Wait for app rollout
        run: sleep 20

      - name: Check app availability
        run: |
          set -e
          for i in 1 2 3 4 5; do
            status=$(curl -L -s -o /dev/null -w "%{http_code}" "$APP_URL")
            if [ "$status" = "200" ]; then
              echo "App is healthy (HTTP 200)."
              exit 0
            fi
            echo "Attempt $i failed with status $status, retrying..."
            sleep 10
          done
          echo "Deployment health check failed."
          exit 1
