name: CI

# CD health checks run in .github/workflows/cd.yml after successful CI on main.

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements/lock.txt

      - name: Run tests with coverage
        run: |
          if [ "${{ matrix.python-version }}" = "3.11" ]; then
            pytest --cov=src --cov-fail-under=98 --cov-report=term-missing --cov-report=xml
          else
            pytest --cov=src --cov-report=term-missing
          fi

      - name: Upload coverage report artifact
        if: matrix.python-version == '3.11'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml

      - name: Upload to Codecov
        if: matrix.python-version == '3.11' && secrets.CODECOV_TOKEN != ''
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          codecov_yml_path: codecov.yml
          flags: unittests
          token: ${{ secrets.CODECOV_TOKEN }}
          verbose: true
          fail_ci_if_error: true

      - name: Skip Codecov (missing token)
        if: matrix.python-version == '3.11' && secrets.CODECOV_TOKEN == ''
        run: echo "Skipping Codecov upload because CODECOV_TOKEN is not configured."

  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install quality tools
        run: |
          python -m pip install --upgrade pip
          pip install black ruff mypy bandit pip-audit

      - name: Run Ruff
        run: |
          ruff check src/services src/ui src/config src/api src/repositories scripts tests

      - name: Run Black format check
        run: |
          black --check src/services src/ui src/config src/api src/repositories scripts tests src/app.py

      - name: Type Check (mypy)
        run: |
          mypy src/app.py src/anomaly_methods.py src/utils.py src/ui/pages.py --strict --show-error-codes --follow-imports=skip --disable-error-code=untyped-decorator

      - name: Type Check (mypy strict)
        run: |
          mypy src/app.py src/anomaly_methods.py src/utils.py src/ui/pages.py --strict --show-error-codes --follow-imports=skip --disable-error-code=untyped-decorator

      - name: Dependency Check
        run: |
          pip install pip-audit
          pip-audit -r requirements/app.txt \
            --ignore-vuln PYSEC-2026-35 \
            --ignore-vuln PYSEC-2026-2141 \
            --ignore-vuln GHSA-537c-gmf6-5ccf

      - name: SAST (Bandit)
        run: |
          bandit -r src/ -ll -f json -o bandit.json

  security:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies and security tools
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements/lock.txt
          pip install bandit pip-audit

      - name: Run Bandit
        run: |
          # Fail on medium/high findings; keep low-level findings in report only.
          bandit -r src/services src/ui -ll -f json -o bandit-report.json

      - name: Upload Bandit report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: bandit-report.json

      - name: Run pip-audit
        run: |
          # Runtime dependency gate (strict): fail CI on new vulnerabilities.
          # Temporary Starlette exceptions are required until FastAPI supports the patched Starlette major line.
          pip-audit -r requirements/app.txt -f json -o pip-audit-report.json \
            --ignore-vuln PYSEC-2026-161 \
            --ignore-vuln PYSEC-2026-248 \
            --ignore-vuln PYSEC-2026-249 \
            --ignore-vuln PYSEC-2026-1942 \
            --ignore-vuln PYSEC-2026-2281 \
            --ignore-vuln PYSEC-2026-2280 \
            --ignore-vuln PYSEC-2026-35 \
            --ignore-vuln PYSEC-2026-2141 \
            --ignore-vuln GHSA-537c-gmf6-5ccf

      - name: Upload pip-audit report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pip-audit-report
          path: pip-audit-report.json

  e2e-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install runtime and e2e dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements/lock.txt
          pip install -r requirements/e2e.txt
          python -m playwright install chromium

      - name: Start Streamlit app
        run: |
          python -m streamlit run src/app.py --server.headless true --server.address 127.0.0.1 --server.port 8501 > streamlit.log 2>&1 &
          started=0
          for i in {1..40}; do
            code=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:8501 || true)
            if [ "$code" = "200" ]; then
              echo "Streamlit started"
              started=1
              break
            fi
            sleep 3
          done
          if [ "$started" -ne 1 ]; then
            echo "Streamlit did not start in time"
            tail -n 200 streamlit.log || true
            exit 1
          fi

      - name: Run Playwright smoke tests
        env:
          E2E_BASE_URL: http://127.0.0.1:8501
        run: |
          pytest tests/e2e -q --no-cov
