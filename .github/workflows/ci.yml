name: CI

# CD health checks run in .github/workflows/cd.yml after successful CI on main.

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.lock

      - name: Run tests with coverage
        run: |
          if [ "${{ matrix.python-version }}" = "3.11" ]; then
            pytest --cov=src --cov-fail-under=95 --cov-report=term-missing --cov-report=xml
          else
            pytest --cov=src --cov-report=term-missing
          fi

      - name: Upload coverage report artifact
        if: matrix.python-version == '3.11'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml

      - name: Upload to Codecov
        if: matrix.python-version == '3.11'
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          fail_ci_if_error: false

  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install quality tools
        run: |
          python -m pip install --upgrade pip
          pip install black ruff

      - name: Run Ruff
        run: |
          ruff check src/services src/ui src/config tests

      - name: Run Black format check
        run: |
          black --check src/services src/ui src/config tests src/app.py

  security:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies and security tools
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.lock
          pip install bandit pip-audit

      - name: Run Bandit
        run: |
          # Fail on medium/high findings; keep low-level findings in report only.
          bandit -r src/services src/ui -ll -f json -o bandit-report.json

      - name: Upload Bandit report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: bandit-report.json

      - name: Run pip-audit
        run: |
          pip-audit -r requirements.lock
        continue-on-error: true

  e2e-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install runtime and e2e dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.lock
          pip install -r requirements-e2e.txt
          python -m playwright install chromium

      - name: Start Streamlit app
        run: |
          python -m streamlit run src/app.py --server.headless true --server.port 8501 > streamlit.log 2>&1 &
          for i in {1..40}; do
            code=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:8501 || true)
            if [ "$code" = "200" ]; then
              echo "Streamlit started"
              break
            fi
            sleep 3
          done

      - name: Run Playwright smoke tests
        env:
          E2E_BASE_URL: http://127.0.0.1:8501
        run: |
          pytest tests/e2e -q
